; =========================================
; Need for Speed Carbon - Extra Options
; Custom Engine Tuning Only
; Version: 1.4 Custom
; =========================================

[ModInfo]
ModName = NFSC Engine Tuning
ModVersion = 1.4
ModAuthor = Empireloyal
ModDescription = Custom engine configuration for vehicle tuning
Enabled = 1

[EngineConfig]

; Engine response
EngineResponseMultiplier = 1.20
RPMResponse = 1.15
ThrottleSensitivity = 1.10

; Acceleration and power
AccelerationMultiplier = 1.25
PowerMultiplier = 1.20
TorqueMultiplier = 1.18

; Top speed and revs
TopSpeedMultiplier = 1.10
NoRevLimiter = 1
MaxRPMMultiplier = 1.15

; Turbo/Nitro behavior
TurboBoostMultiplier = 1.20
NitroPowerMultiplier = 1.30
NitroDurationMultiplier = 1.15

; Engine efficiency
EngineEfficiency = 1.10
GearShiftResponse = 1.15

; Stability under load
HighSpeedEngineStability = 1.10

; Engine-only profile.

[VehicleCompatibility]
; Apply mod to all vehicles
ApplyToAllVehicles = 1

; Or specify specific vehicles (uncomment to use)
; TargetVehicles = Corvette, Nissan350Z, BMW, Ford, Dodge

[PerformanceProfiles]

; Profile 1: Balanced
[Profile_Balanced]
AccelerationMultiplier = 1.15
PowerMultiplier = 1.12
TorqueMultiplier = 1.10
NitroPowerMultiplier = 1.20
TopSpeedMultiplier = 1.05

; Profile 2: Aggressive
[Profile_Aggressive]
AccelerationMultiplier = 1.35
PowerMultiplier = 1.30
TorqueMultiplier = 1.25
NitroPowerMultiplier = 1.40
TopSpeedMultiplier = 1.15

; Profile 3: Extreme
[Profile_Extreme]
AccelerationMultiplier = 1.50
PowerMultiplier = 1.45
TorqueMultiplier = 1.40
NitroPowerMultiplier = 1.50
TopSpeedMultiplier = 1.20

[ScriptHooks]
; Script entry points
OnEngineStart = InitializeEngineMod
OnVehicleLoad = LoadVehicleConfig
OnAccelerate = ApplyAccelerationMultiplier
OnNitroUse = ApplyNitroBoost
OnTurboUse = ApplyTurboBoost

[LoadOrder]
; Priority of mod loading (higher = loads first)
Priority = 100
InitDelay = 0

[Logging]
; Enable debug logging
DebugMode = 1
LogToFile = 1
LogPath = /logs/nfsc_engine_mod.log

[Validation]
; Validate mod integrity
ValidateOnLoad = 1
CheckVersionCompatibility = 1
RequiredGameVersion = 1.0

; Engine-only profile configuration complete.