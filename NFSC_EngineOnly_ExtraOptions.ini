; =========================================
; Need for Speed Carbon - Extra Options
; Custom Engine Tuning Only
; Version: 1.4 Custom
; =========================================

[EngineConfig]

; Engine response
EngineResponseMultiplier = 1.20
RPMResponse = 1.15
ThrottleSensitivity = 1.10

; Acceleration and power
AccelerationMultiplier = 1.25
PowerMultiplier = 1.20
TorqueMultiplier = 1.18

; Top speed and revs
TopSpeedMultiplier = 1.10
NoRevLimiter = 1
MaxRPMMultiplier = 1.15

; Turbo/Nitro behavior
TurboBoostMultiplier = 1.20
NitroPowerMultiplier = 1.30
NitroDurationMultiplier = 1.15

; Engine efficiency
EngineEfficiency = 1.10
GearShiftResponse = 1.15

; Stability under load
HighSpeedEngineStability = 1.10

; Engine-only profile.